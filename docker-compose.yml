version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: stationery-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend:
    build: ./backend
    container_name: stationery-backend
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/stationery_management}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stationery-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  uploads_data:
